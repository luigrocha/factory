plugins {
	id 'org.springframework.boot' version '2.6.7'
	id 'io.spring.dependency-management' version '1.0.11.RELEASE'
	id 'java'
}

subprojects {
	apply plugin: 'java'
	apply plugin: 'org.springframework.boot'
}

allprojects {
	group = 'org.crsoft.cartonplast'
	version = '1.0.0-SNAPSHOT'

	java.sourceCompatibility(JavaVersion.VERSION_11)

	configurations {
		compileOnly.extendsFrom annotationProcessor
		testCompileOnly.extendsFrom annotationProcessor
		testAnotationProcesor.extendsFrom annotationProcessor
	}

	repositories {
		mavenCentral()
	}

	dependencies {
		//implementation 'org.springframework.boot:spring-boot-starter-data-jpa:2.6.7'
		//implementation 'org.springframework.boot:spring-boot-starter-security:2.6.7'
		implementation 'org.springframework.boot:spring-boot-starter-web:2.6.7'
		compileOnly 'org.projectlombok:lombok:1.18.24'
		developmentOnly 'org.springframework.boot:spring-boot-devtools:2.6.7'
		//runtimeOnly 'org.mariadb.jdbc:mariadb-java-client:3.0.4'
		annotationProcessor 'org.projectlombok:lombok:1.18.24'

		//implementation group: 'org.keycloak.bom', name: 'keycloak-adapter-bom', version: '18.0.0', ext: 'pom'
		//implementation group: 'org.keycloak', name: 'keycloak-spring-boot-starter', version: '18.0.0'

		testImplementation 'org.springframework.boot:spring-boot-starter-test:2.6.7'
		testImplementation 'org.springframework.security:spring-security-test:5.6.3'
	}

	tasks.named('test') {
		useJUnitPlatform()
	}
}

dependencies {
	implementation project(":cp-core-vo")
	implementation project(":cp-desing-ws")
}
<div class="p-grid">
  <div class="p-col-12">
    <p-toast></p-toast>

    <div class="card">
      <p-table #dt
               [value]="users"
               [columns]="cols"
               [rows]="10"
               [paginator]="true"
               [globalFilterFields]="['userName', 'firstName', 'lastName', 'roles']"
               [(selection)]="selectedUsers"
               [showCurrentPageReport]="true"
               [rowsPerPageOptions]="[10,25,50]"
               [rowHover]="true"
               dataKey="id"
               styleClass="p-datatable-sm">
        <ng-template pTemplate="caption">
          <div class="flex justify-content-between flex-column sm:flex-row">
            <h5 class="h-100 align-self-center mb-2 md:mb-0">Gestión de Usuarios</h5>
            <span class="flex-auto"></span>
            <button pButton
                    pRipple
                    label="Nuevo"
                    icon="pi pi-plus"
                    class="mb-2 md:mr-2 md:mb-0"
                    (click)="openNew()"
                    *ngIf="isAllow(1)"></button>
            <button pButton
                    pRipple
                    label="Eliminar"
                    icon="pi pi-trash"
                    class="p-button-danger mb-2 md:mr-2 md:mb-0"
                    (click)="deleteSelectedUsers()"
                    [disabled]="!selectedUsers || !selectedUsers.length"
                    *ngIf="isAllow(4)"></button>
            <button pButton
                    pRipple
                    label="Export"
                    icon="pi pi-upload"
                    class="p-button-help mb-2 md:mr-2 md:mb-0"
                    (click)="dt.exportCSV()"
                    *ngIf="isAllow(5)"></button>
            <span class="p-input-icon-left">
              <i class="pi pi-search"></i>
              <input pInputText type="text"
                     (input)="dt.filterGlobal($event.target.value, 'contains')"
                     placeholder="Buscar..."
                     class="w-full"/>
            </span>
          </div>
        </ng-template>
        <ng-template pTemplate="header">
          <tr>
            <th style="width: 3rem">
              <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
            </th>
            <th pSortableColumn="username">
              Usuario
              <p-sortIcon field="username"></p-sortIcon>
            </th>
            <th pSortableColumn="firstName">
              Nombre
              <p-sortIcon field="firstName"></p-sortIcon>
            </th>
            <th pSortableColumn="lastName">
              Apellido
              <p-sortIcon field="lastName"></p-sortIcon>
            </th>
            <th>Email</th>
            <th>Roles</th>
            <th class="text-center">
              <i class="pi pi-cog" style="font-size: 18px;" pTooltip="Opciones"></i>
            </th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-user>
          <tr>
            <td>
              <p-tableCheckbox [value]="user"></p-tableCheckbox>
            </td>
            <td>
              <span class="p-column-title">Usuario</span>
              {{ user.username }}
            </td>
            <td>
              <span class="p-column-title">Nombre</span>
              {{ user.firstName }}
            </td>
            <td>
              <span class="p-column-title">Apellido</span>
              {{ user.lastName }}
            </td>
            <td>
              <span class="p-column-title">Email</span>
              {{ user.email }}
            </td>
            <td>
              <p-tag *ngFor="let role of user.roles"
                     styleClass="mb-2 mr-2"
                     severity="{{ getRoleType(role).color }}"
                     value="{{ getRoleType(role).name }}"
                     [rounded]="true">
              </p-tag>
            </td>
            <td style="justify-content: center;">
              <div class="flex justify-content-evenly">
                <button type="button"
                        pButton
                        icon="pi pi-ellipsis-v"
                        class="p-button-secondary p-button-outlined"
                        (click)="userSelect = user;menu.toggle($event)">
                </button>
              </div>
              <p-menu #menu [popup]="true" [model]="items" appendTo="body"></p-menu>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="summary">
          <div class="p-d-flex p-ai-center p-jc-between">
            Total de usuarios:
            {{ users ? users.length : 0 }}
          </div>
        </ng-template>
      </p-table>
    </div>
    <p-confirmDialog [style]="{ width: '450px' }"
                     rejectButtonStyleClass="p-button-text"
                     acceptButtonStyleClass="p-button-raised"></p-confirmDialog>
  </div>
</div>

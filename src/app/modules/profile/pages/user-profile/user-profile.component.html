<div class="card overflow-hidden p-0">
  <div class="h-16rem relative overflow-hidden">
    <p-galleria [value]="images"
                [responsiveOptions]="responsiveOptions"
                [showThumbnails]="false"
                [circular]="true"
                [autoPlay]="true"
                [transitionInterval]="3000"
                [numVisible]="7">
      <ng-template pTemplate="item" let-item>
        <img [src]="item.itemImageSrc"
             style="display: block;"
             class="w-full h-full object-cover opacity-9 bg-contrast"
             [alt]="item.title"/>
      </ng-template>
    </p-galleria>
    <div class="absolute opacity-25 position-0 w-full h-full z-0">
    </div>
    <p-avatar *ngIf="!userImageUrl"
              image="assets/img/avatars/avatar.png"
              class="absolute top-6 left-4 sm:hidden w-6rem h-6rem"
              size="xlarge"
              shape="circle"></p-avatar>
    <p-avatar *ngIf="userImageUrl"
              [image]="userImageUrl"
              class="absolute top-6 left-4 sm:hidden w-6rem h-6rem"
              size="xlarge"
              shape="circle"></p-avatar>
  </div>
  <div class="z-10 relative -mt-16 px-gutter flex align-items-center">
    <app-user-avatar styleClasses="w-6rem h-6rem hidden-xs"></app-user-avatar>
    <div class="max-w-full flex-auto sm:ml-4">
      <div class="h-4rem flex align-items-center">
        <h2 class="text-contrast m-0 ">{{userData.name}}</h2>
      </div>
      <p-tabMenu #tb styleClass="border-0 flex relative flex-shrink-0"
                 [model]="items"
                 (click)="changeTab(tb)"
                 [routerLinkActive]="activeItem.routerLink"></p-tabMenu>
    </div>
  </div>
</div>
<router-outlet></router-outlet>

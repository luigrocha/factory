<div class="p-grid">
  <div class="p-col-12">
    <p-toast></p-toast>

    <div class="card">
      <div class="flex justify-content-between">
        <h5 class="m-0 mb-5">Orden de mezcla {{ 1 }}</h5>
        <i
          (click)="showFilters = true"
          class="pi pi pi-info-circle"
          style="font-size: 2rem"
        ></i>
      </div>

      <div
        class="flex flex-column md:flex-wrap md:flex-row md:justify-content-between md:align-items-center mb-5"
      >
        <div class="field col-6 flex flex-column"></div>

        <div class="field col-6 flex flex-column"></div>

        <div class="field col-6 flex flex-column"></div>
      </div>
    </div>
  </div>
</div>

<p-sidebar [(visible)]="showFilters" [baseZIndex]="10000" position="right">
  <h3 style="font-weight: normal">Mezclas Anteriores</h3>
  <h5>Última mezcla: 1</h5>
  <div class="p-fluid formgrid">
    <div class="field">
      <label for="client">Cliente</label>
      <input id="client" maxlength="32" pInputText type="text"/>
    </div>
    <div class="field">
      <label for="die">Troquel</label>
      <input id="die" maxlength="32" pInputText type="text"/>
    </div>
    <div class="field">
      <label for="cirel">Cirel</label>
      <input id="cirel" maxlength="32" pInputText type="text"/>
    </div>
    <div class="field">
      <label for="mix">Mezcla de</label>
      <input id="mix" maxlength="32" pInputText type="text"/>
    </div>
    <div class="field">
      <label for="number">Numero</label>
      <input id="number" maxlength="32" pInputText type="text"/>
    </div>
  </div>
  <div class="flex justify-content-evenly mt-5">
    <button
      class="p-button-raised"
      icon="pi pi-copy"
      label="Traer"
      pButton
      pRipple
    ></button>
    <button
      class="p-button-raised"
      icon="pi pi-filter-slash"
      label="Limpiar"
      pButton
      pRipple
    ></button>
  </div>
</p-sidebar>

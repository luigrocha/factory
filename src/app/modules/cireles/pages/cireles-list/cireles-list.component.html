<div class="p-grid">
  <div class="p-col-12">
    <p-toast></p-toast>

    <div class="card">
      <p-table #dt [value]="cirels" [columns]="columns" [rows]="pageSize" [paginator]="true"
        [globalFilterFields]="['print', 'description']" [rowHover]="true" dataKey="id" [showCurrentPageReport]="true"
        [currentPageReportTemplate]="tableReportTemplate" styleClass="p-datatable-sm" lazy="true"
        [rowsPerPageOptions]="rowsPerPageOptions" responsiveLayout="scroll">
        <ng-template pTemplate="caption">
          <div class="flex justify-content-between flex-column sm:flex-row">
            <h5 class="h-100 mb-0 align-self-center">Gestión de Cireles</h5>
            <span class="flex-auto"></span>
            <button pButton pRipple label="Nuevo" class="mr-2" icon="pi pi-plus" (click)="addNewCyrel()"></button>
            <span class="p-input-icon-left">
              <i class="pi pi-search"></i>
              <input pInputText type="text" (input)="dt.filterGlobal($event.target.value, 'contains')"
                placeholder="Buscar..." class="w-full" />
            </span>
          </div>
        </ng-template>
        <ng-template pTemplate="header">
          <tr>
            <th *ngFor="let col of columns">
              {{col.header}}
            </th>
            <th class="text-center">
              <i class="pi pi-cog" style="font-size: 18px" pTooltip="Opciones"></i>
            </th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-cirel let-expanded="expanded">
          <tr>
            <td>
              {{ cirel.print }}
            </td>
            <td style="min-width: 12rem">
              {{ cirel.printer }}
            </td>
            <td style="min-width: 15rem">
              {{ cirel.description }}
            </td>
            <td>
              <button type="button" pButton pRipple [pRowToggler]="cirel"
                class="p-button-text p-button-rounded p-button-plain"
                [icon]="expanded ? 'pi pi-chevron-down' : 'pi pi-chevron-right'">
              </button>
            </td>
            <!-- <td style="min-width: 10rem">
              {{ cirel.mbLeaf }}
            </td> -->
            <td style="min-width: 15rem">
              {{ cirel.die?.code }} - {{ cirel.die?.name }}
            </td>
            <td style="min-width: 15rem">
              {{ cirel.observation }}
            </td>
            <!-- <td style="min-width: 10rem">
              {{ cirel.description2 }}
            </td> -->
            <td>
              <div class="flex justify-content-center">
                <button type="button"
                        pButton
                        icon="pi pi-ellipsis-v"
                        class="p-button-secondary p-button-outlined"
                        (click)="selectedCirel = cirel; menu1.toggle($event)">
                </button>
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="rowexpansion" let-cirel>
          <tr>
            <td colspan="10">
              <div class="p-3">
                <p-table [value]="cirel.cyrelColors" dataKey="id" responsiveLayout="scroll">
                  <ng-template pTemplate="header">
          <tr>
            <th *ngFor="let header of subHeaders">
              <div class="p-d-flex p-jc-between p-ai-center">
                {{ header.label }}
              </div>
            </th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-color>
          <tr>
            <td>
              {{ color.colorType }}
            </td>
            <td>
              <p-avatar [style]="{'background-color': color.colorCode, border: '1px solid #edf4fa'}" shape="circle"
                [pTooltip]="color.color">
              </p-avatar>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
    </td>
    </tr>
    </ng-template>
    <ng-template pTemplate="summary">
      <div class="p-d-flex p-ai-center p-jc-between">
        Total de registros: {{ table?.totalRecords }}
      </div>
    </ng-template>
    </p-table>
  </div>
</div>
</div>
<p-menu #menu1 [popup]="true" [model]="menuItems"></p-menu>

<div class="p-grid">
  <div class="p-col-12">
    <p-toast></p-toast>

    <div class="card">
      <p-table #dt
               [value]="homos"
               [columns]="columns"
               [rows]="pageSize"
               [paginator]="true"
               [globalFilterFields]="['percentage', 'hpCode']"
               [rowHover]="true"
               dataKey="id"
               [showCurrentPageReport]="true"
               [currentPageReportTemplate]="tableReportTemplate"
               [rowsPerPageOptions]="rowsPerPageOptions"
               [(selection)]="selectedHomos"
               styleClass="p-datatable-sm">
        <ng-template pTemplate="caption">
          <div class="flex justify-content-between flex-column sm:flex-row">
            <h5 class="h-100 align-self-center mb-2 md:mb-0">Gestión de Homopolímeros</h5>
            <span class="flex-auto"></span>
            <button pButton
                    pRipple
                    label="Nuevo"
                    icon="pi pi-plus"
                    class="sm:mr-2 md:mr-2 lg:mr-2"
                    (click)="saveHomo()"
                    *ngIf="isAllow(1)"
            ></button>
            <button pButton
                    pRipple
                    label="Eliminar"
                    icon="pi pi-trash"
                    class="p-button-danger mb-2 md:mr-2 md:mb-0"
                    (click)="deleteSelectedHomo()"
                    [disabled]="!selectedHomos || !selectedHomos.length"
                    *ngIf="isAllow(4)"
            ></button>
            <button pButton
                    pRipple
                    label="Export"
                    icon="pi pi-upload"
                    class="p-button-help mb-2 md:mr-2 md:mb-0"
                    (click)="dt.exportCSV()"
                    *ngIf="isAllow(5)"
            ></button>
            <span class="p-input-icon-left">
              <i class="pi pi-search"></i>
              <input pInputText type="text"
                     (input)="dt.filterGlobal($event.target.value, 'contains')"
                     placeholder="Buscar..."
                     class="w-full"/>
            </span>
          </div>
        </ng-template>
        <ng-template pTemplate="header">
          <tr>
            <th style="width: 3rem">
              <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
            </th>
            <th pSortableColumn="percentage">
              Porcentaje
              <p-sortIcon field="percentage"></p-sortIcon>
            </th>
            <th pSortableColumn="hpCode">
              HP
              <p-sortIcon field="hpCode"></p-sortIcon>
            </th>
            <th class="text-center">
              <i class="pi pi-cog" style="font-size: 18px" pTooltip="Opciones"></i>
            </th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-homo>
          <tr>
            <td>
              <p-tableCheckbox [value]="homo"></p-tableCheckbox>
            </td>
            <td>
              <span class="p-column-title">Porcentaje</span>
              {{ homo.percentage }}
            </td>
            <td>
              <span class="p-column-title">HP</span>
              {{ homo.hpCode }}
            </td>
            <td>
              <div class="flex justify-content-center">
                <button type="button"
                        pButton
                        icon="pi pi-ellipsis-v"
                        class="p-button-secondary p-button-outlined"
                        (click)="selectedHomo = homo; menu.toggle($event)">
                </button>
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="summary">
          <div class="p-d-flex p-ai-center p-jc-between">
            Total de Homopolímeros:
            {{ homos ? homos.length : 0 }}
          </div>
        </ng-template>
      </p-table>
    </div>
    <p-confirmDialog [style]="{ width: '450px' }"
                     rejectButtonStyleClass="p-button-text"
                     acceptButtonStyleClass="p-button-raised"></p-confirmDialog>
  </div>
</div>
<p-menu #menu [popup]="true" [model]="menuItems" appendTo="body"></p-menu>

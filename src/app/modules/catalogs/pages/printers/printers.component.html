<div class="p-grid">
  <div class="p-col-12">
    <p-toast></p-toast>

    <div class="card">
      <p-table #dt [value]="printers" [columns]="cols" [rows]="7" [paginator]="true"
        [globalFilterFields]="['name', 'description']" [(selection)]="selectedPrinter" [rowHover]="true" dataKey="id"
        [showCurrentPageReport]="true" [rowsPerPageOptions]="[10,25,50]"
        styleClass="p-datatable-customers p-datatable-sm">
        <ng-template pTemplate="caption">
          <div class="flex justify-content-between flex-column sm:flex-row">
            <h5 class="h-100 align-self-center mb-2 md:mb-0">Gestión de Impresoras</h5>
            <span class="flex-auto"></span>
            <button pButton pRipple label="Nuevo" icon="pi pi-plus" class="mb-2 md:mr-2 md:mb-0" (click)="openNew()"
              *ngIf="isAllow(1)"></button>
            <button pButton pRipple label="Eliminar" icon="pi pi-trash" class="p-button-danger mb-2 md:mr-2 md:mb-0"
              (click)="deleteSelectedPrinters()" [disabled]="!selectedPrinter || !selectedPrinter.length"
              *ngIf="isAllow(4)"></button>
            <button pButton pRipple label="Export" icon="pi pi-upload" class="p-button-help mb-2 md:mr-2 md:mb-0"
              (click)="dt.exportCSV()" *ngIf="isAllow(5)"></button>

            <span class="p-input-icon-left">
              <i class="pi pi-search"></i>
              <input pInputText type="text" (input)="dt.filterGlobal($event.target.value, 'contains')"
                placeholder="Buscar..." class="w-full" />
            </span>
          </div>
        </ng-template>
        <ng-template pTemplate="header">
          <tr>
            <th style="width: 3rem">
              <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
            </th>
            <th pSortableColumn="name">
              Nombre <p-sortIcon field="name"></p-sortIcon>
            </th>
            <th pSortableColumn="numColors">
              N° Colores <p-sortIcon field="numColors"></p-sortIcon>
            </th>
            <th pSortableColumn="description">
              Descripción <p-sortIcon field="description"></p-sortIcon>
            </th>
            <th style="
                text-align: center;
                display: flex;
                justify-content: space-around;
                min-height: 36.5px;
              ">
              <i class="pi pi-cog" style="font-size: 18px" pTooltip="Opciones"></i>
            </th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-printer>
          <tr>
            <td>
              <p-tableCheckbox [value]="printer"></p-tableCheckbox>
            </td>
            <td>
              <span class="p-column-title">Nombre</span>
              {{ printer.name }}
            </td>
            <td>
              <span class="p-column-title">N° Colores</span>
              {{ printer.numColors }}
            </td>
            <td>
              <span class="p-column-title">Descripción</span>
              {{ printer.description }}
            </td>
            <td style="justify-content: center;">
              <div class="flex justify-content-evenly">
                <button type="button" pButton icon="pi pi-ellipsis-v" class="p-button-secondary p-button-outlined"
                  (click)="printerSelect = printer;menu.toggle($event)">
                </button>
              </div>
              <p-menu #menu [popup]="true" [model]="items" appendTo="body"></p-menu>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="summary">
          <div class="p-d-flex p-ai-center p-jc-between">
            Total de Impresoras:
            {{ printers ? printers.length : 0 }}
          </div>
        </ng-template>
      </p-table>
    </div>

    <p-dialog [(visible)]="printerDialog" [style]="{ width: '450px' }" header="Detalles de Impresora" [modal]="true"
      styleClass="p-fluid">
      <ng-template pTemplate="content">
        <div class="p-field">
          <label for="name">Nombre</label>
          <input type="text" pInputText id="name" [(ngModel)]="printer.name" required autofocus />
          <small class="p-invalid" *ngIf="submitted && !printer.name">Campo nombre es requerido.</small>
        </div>
        <div class="p-field">
          <label for="numColors">N° Colores</label>
          <input type="number" pInputText id="numColors" [(ngModel)]="printer.numColors" required />
          <small class="p-invalid" *ngIf="submitted && !printer.numColors">Campo n° colores es requerido.</small>
        </div>
        <div class="p-field">
          <label for="description">Descripción</label>
          <input type="text" pInputText id="description" [(ngModel)]="printer.description" required />
          <small class="p-invalid" *ngIf="submitted && !printer.description">Campo descripción es requerido.</small>
        </div>
      </ng-template>

      <ng-template pTemplate="footer">
        <button pButton pRipple label="Cancelar" icon="pi pi-times" class="p-button-text"
          (click)="hideDialog()"></button>
        <button pButton pRipple label="Guardar" icon="pi pi-check" class="p-button-text"
          (click)="savePrinter()"></button>
      </ng-template>
    </p-dialog>

    <p-confirmDialog [style]="{ width: '450px' }"></p-confirmDialog>
  </div>
</div>

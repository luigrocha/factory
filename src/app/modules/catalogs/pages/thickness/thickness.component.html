<div class="p-grid">
  <div class="p-col-12">
    <p-toast></p-toast>

    <div class="card">
      <p-table #dt [value]="thickness" [columns]="cols" [rows]="7" [paginator]="true"
        [globalFilterFields]="['id', 'weight','thickness']" [(selection)]="selectedThicknes" [rowHover]="true"
        [showCurrentPageReport]="true" [rowsPerPageOptions]="[10,25,50]" dataKey="id"
        styleClass="p-datatable-customers p-datatable-sm">
        <ng-template pTemplate="caption">
          <div class="flex justify-content-between flex-column sm:flex-row">
            <h5 class="h-100 align-self-center mb-2 md:mb-0">Gestión de Grosor</h5>
            <span class="flex-auto"></span>
            <button pButton pRipple label="Nuevo" icon="pi pi-plus" class="mb-2 md:mr-2 md:mb-0" (click)="openNew()"
              *ngIf="isAllow(1)"></button>
            <button pButton pRipple label="Eliminar" icon="pi pi-trash" class="p-button-danger mb-2 md:mr-2 md:mb-0"
              (click)="deleteSelectedThicknesss()" [disabled]="!selectedThicknes || !selectedThicknes.length"
              *ngIf="isAllow(4)"></button>
            <button pButton pRipple label="Export" icon="pi pi-upload" class="p-button-help mb-2 md:mr-2 md:mb-0"
              (click)="dt.exportCSV()" *ngIf="isAllow(5)"></button>
            <span class="p-input-icon-left">
              <i class="pi pi-search"></i>
              <input pInputText type="text" (input)="dt.filterGlobal($event.target.value, 'contains')"
                placeholder="Buscar..." class="w-full" />
            </span>
          </div>
        </ng-template>
        <ng-template pTemplate="header">
          <tr>
            <th style="width: 3rem">
              <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
            </th>
            <th pSortableColumn="weight">
              Peso <p-sortIcon field="weight"></p-sortIcon>
            </th>
            <th pSortableColumn="thickness">
              Grosor <p-sortIcon field="thickness"></p-sortIcon>
            </th>
            <th style="
                text-align: center;
                display: flex;
                justify-content: space-around;
                min-height: 36.5px;
              ">
              <i class="pi pi-cog" style="font-size: 18px" pTooltip="Opciones"></i>
            </th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-thicknes>
          <tr>
            <td>
              <p-tableCheckbox [value]="thicknes"></p-tableCheckbox>
            </td>
            <td>
              <span class="p-column-title">Peso</span>
              {{ thicknes.weight }}
            </td>
            <td>
              <span class="p-column-title">Grosor</span>
              {{ thicknes.thick }}
            </td>
            <td style="justify-content: center;">
              <div class="flex justify-content-evenly">
                <button type="button" pButton icon="pi pi-ellipsis-v" class="p-button-secondary p-button-outlined"
                  (click)="thicknesSelect = thicknes;menu.toggle($event)">
                </button>
              </div>
              <p-menu #menu [popup]="true" [model]="items" appendTo="body"></p-menu>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="summary">
          <div class="p-d-flex p-ai-center p-jc-between">
            Total de items grosor:
            {{ thickness ? thickness.length : 0 }}
          </div>
        </ng-template>
      </p-table>
    </div>

    <p-dialog [(visible)]="thicknesDialog" [style]="{ width: '450px' }" header="Detalles de Colores A" [modal]="true"
      styleClass="p-fluid">
      <ng-template pTemplate="content">
        <div class="p-field">
          <label for="weight">Peso</label>
          <input type="number" pInputText id="weight" [(ngModel)]="thicknes.weight" required autofocus />
          <small class="p-invalid" *ngIf="submitted && !thicknes.weight">Campo peso es requerido.</small>
        </div>
        <div class="p-field">
          <label for="thickness">Grosor</label>
          <input type="number" pInputText id="thickness" [(ngModel)]="thicknes.thick" required />
          <small class="p-invalid" *ngIf="submitted && !thicknes.thick">Campo grosor es requerido.</small>
        </div>
      </ng-template>

      <ng-template pTemplate="footer">
        <button pButton pRipple label="Cancelar" icon="pi pi-times" class="p-button-text"
          (click)="hideDialog()"></button>
        <button pButton pRipple label="Guardar" icon="pi pi-check" class="p-button-text"
          (click)="saveThickness()"></button>
      </ng-template>
    </p-dialog>

    <p-confirmDialog [style]="{ width: '450px' }"></p-confirmDialog>
  </div>
</div>

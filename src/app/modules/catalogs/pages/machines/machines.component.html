<div class="p-grid">
  <div class="p-col-12">
    <p-toast></p-toast>

    <div class="card">
      <p-table #dt
               [value]="machines"
               [columns]="columns"
               [rows]="pageSize"
               [paginator]="true"
               [globalFilterFields]="['name']"
               [rowHover]="true"
               dataKey="id"
               [showCurrentPageReport]="true"
               [currentPageReportTemplate]="tableReportTemplate"
               [rowsPerPageOptions]="rowsPerPageOptions"
               styleClass="p-datatable-sm"
               responsiveLayout="scroll">
        <ng-template pTemplate="caption">
          <div class="flex justify-content-between flex-column sm:flex-row">
            <h5 class="h-100 mb-0 align-self-center">Gestión de Máquinas</h5>
            <span class="flex-auto"></span>
            <button
                    pButton
                    pRipple
                    label="Nuevo"
                    class="sm:mr-2 md:mr-2 lg:mr-2"
                    icon="pi pi-plus"
                    (click)="addMachine()"
            ></button>
            <span class="p-input-icon-left">
              <i class="pi pi-search"></i>
              <input pInputText
                     type="text"
                     (input)="dt.filterGlobal($event.target.value, 'contains')"
                     placeholder="Buscar..."
                     class="w-full"/>
            </span>
          </div>
        </ng-template>
        <ng-template pTemplate="header">
          <tr>
            <th *ngFor="let col of columns" [pSortableColumn]="col.field">
              {{col.header}} <p-sortIcon [field]="col.field"></p-sortIcon>
            </th>
            <th class="text-center">
              <i class="pi pi-cog" style="font-size: 18px" pTooltip="Opciones"></i>
            </th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-machine>
          <tr>
            <td *ngFor="let col of columns">
              <ng-container *ngIf="col.field === 'hasDesb'; else textContent">
                <div class="field-checkbox">
                  <p-checkbox disabled [(ngModel)]="machine[col.field]" [binary]="true" id="hasDesb" inputId="hasDesb"></p-checkbox>
                  <label for="hasDesb">{{getDesbMessage(machine[col.field])}}</label>
                </div>
              </ng-container>
              <ng-template #textContent>
                {{machine[col.field]}}
              </ng-template>
            </td>
            <td>
              <div class="flex justify-content-center">
                <button type="button"
                        pButton
                        icon="pi pi-ellipsis-v"
                        class="p-button-secondary p-button-outlined"
                        (click)="selectedMachine = machine; menu1.toggle($event)">
                </button>
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="summary">
          <div class="p-d-flex p-ai-center p-jc-between">
            Total de Máquinas:
            {{ machines ? machines.length : 0 }}
          </div>
        </ng-template>
      </p-table>
    </div>
    <p-confirmDialog [style]="{ width: '450px' }"
                     rejectButtonStyleClass="p-button-text"
                     acceptButtonStyleClass="p-button-raised"></p-confirmDialog>
  </div>
</div>
<p-menu #menu1 [popup]="true" [model]="menuItems"></p-menu>

<div class="p-grid">
  <div class="p-col-12">
    <p-toast></p-toast>

    <div class="card">
      <p-table #dt [value]="locations" [columns]="cols" [rows]="7" [paginator]="true"
        [globalFilterFields]="['location', 'description']" [(selection)]="selectedlocation" [rowHover]="true"
        [showCurrentPageReport]="true" [rowsPerPageOptions]="[10,25,50]" dataKey="id"
        styleClass="p-datatable-customers p-datatable-sm">
        <ng-template pTemplate="caption">
          <div class="flex justify-content-between flex-column sm:flex-row">
            <h5 class="h-100 align-self-center mb-2 md:mb-0">Gestión de Ubicaciones</h5>
            <span class="flex-auto"></span>
            <button pButton pRipple label="Nuevo" icon="pi pi-plus" class="mb-2 md:mr-2 md:mb-0" (click)="openNew()"
              *ngIf="isAllow(1)"></button>
            <button pButton pRipple label="Eliminar" icon="pi pi-trash" class="p-button-danger mb-2 md:mr-2 md:mb-0"
              (click)="deleteSelectedHomo()" [disabled]="!selectedlocation || !selectedlocation.length"
              *ngIf="isAllow(4)"></button>
            <button pButton pRipple label="Export" icon="pi pi-upload" class="p-button-help mb-2 md:mr-2 md:mb-0"
              (click)="dt.exportCSV()" *ngIf="isAllow(5)"></button>
            <span class="p-input-icon-left">
              <i class="pi pi-search"></i>
              <input pInputText type="text" (input)="dt.filterGlobal($event.target.value, 'contains')"
                placeholder="Buscar..." class="w-full" />
            </span>
          </div>
        </ng-template>
        <ng-template pTemplate="header">
          <tr>
            <th style="width: 3rem">
              <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
            </th>
            <th pSortableColumn="location">
              Codigo <p-sortIcon field="location"></p-sortIcon>
            </th>
            <th pSortableColumn="description">
              Ubicación <p-sortIcon field="description"></p-sortIcon>
            </th>
            <th style="
                text-align: center;
                display: flex;
                justify-content: space-around;
                min-height: 36.5px;
              ">
              <i class="pi pi-cog" style="font-size: 18px" pTooltip="Opciones"></i>
            </th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-location>
          <tr>
            <td>
              <p-tableCheckbox [value]="location"></p-tableCheckbox>
            </td>
            <td>
              <span class="p-column-title">Codigo</span>
              {{ location.location }}
            </td>
            <td>
              <span class="p-column-title">Ubicación</span>
              {{ location.description }}
            </td>
            <td style="justify-content: center;">
              <div class="flex justify-content-evenly">
                <button type="button" pButton icon="pi pi-ellipsis-v" class="p-button-secondary p-button-outlined"
                  (click)="locationSelect = location;menu.toggle($event)">
                </button>
              </div>
              <p-menu #menu [popup]="true" [model]="items" appendTo="body"></p-menu>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="summary">
          <div class="p-d-flex p-ai-center p-jc-between">
            Total de Ubicaciones:
            {{ locations ? locations.length : 0 }}
          </div>
        </ng-template>
      </p-table>
    </div>

    <p-dialog [(visible)]="locationDialog" [style]="{ width: '450px' }" header="Detalles de la Ubicación" [modal]="true"
      styleClass="p-fluid">
      <ng-template pTemplate="content">
        <div class="p-field">
          <label for="location">Código</label>
          <input type="text" pInputText id="location" [(ngModel)]="location.location" required autofocus />
          <small class="p-invalid" *ngIf="submitted && !location.location">Campo código es requerido.</small>
        </div>
        <div class="p-field">
          <label for="description">Ubicación</label>
          <input type="text" pInputText id="description" [(ngModel)]="location.description"
            style="text-transform: uppercase" required />
          <small class="p-invalid" *ngIf="submitted && !location.description">Campo descripción es requerido.</small>
        </div>
      </ng-template>

      <ng-template pTemplate="footer">
        <button pButton pRipple label="Cancelar" icon="pi pi-times" class="p-button-text"
          (click)="hideDialog()"></button>
        <button pButton pRipple label="Guardar" icon="pi pi-check" class="p-button-text" (click)="saveHomo()"></button>
      </ng-template>
    </p-dialog>

    <p-confirmDialog [style]="{ width: '450px' }"></p-confirmDialog>
  </div>
</div>

<form (ngSubmit)="save()" [formGroup]="form" autocomplete="off">
  <div class="p-fluid">
    <div class="field">
      <label for="name">Nombre</label>
      <input pInputText
             id="name"
             [ngClass]="{'ng-invalid ng-dirty': name.touched && name.invalid}"
             formControlName="name"
             aria-describedby="name-help"
             maxlength="32"
             type="text" />
      <small *ngIf="name.touched && name.hasError('required')"
             id="name-help"
             class="p-error block">{{formErrors.required}}</small>
    </div>
    <div class="field-checkbox pt-2 justify-content-start">
      <label for="hasDesb">Tiene desbrozador</label>
      <p-checkbox [formControl]="hasDesbFormCtrl"
                  class="ml-2"
                  [binary]="true"
                  id="hasDesb"
                  inputId="hasDesb"></p-checkbox>
    </div>
  </div>
  <div class="col-12 pb-0 pt-4 pr-0 pl-0 text-right">
    <button pButton
            pRipple
            type="button"
            label="Cancelar"
            icon="pi pi-times"
            (click)="close()"
            class="p-button-text mr-4">
    </button>
    <button pButton
            pRipple
            [disabled]="form.invalid"
            type="submit"
            label="Guardar"
            icon="pi pi-check"
            class="p-button-raised">
    </button>
  </div>
</form>

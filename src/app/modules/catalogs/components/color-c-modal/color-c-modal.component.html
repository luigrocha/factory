<form (ngSubmit)="save()" [formGroup]="form" autocomplete="off">
  <div class="p-fluid">
    <div class="field">
      <label for="name">Nombre</label>
      <input pInputText
             id="name"
             [ngClass]="{'ng-invalid ng-dirty': name.touched && name.invalid}"
             formControlName="name"
             aria-describedby="name-help"
             appInputUppercase
             type="text" />
      <small *ngIf="name.touched && name.hasError('required')"
             id="name-help"
             class="p-error block">{{formErrors.required}}</small>
    </div>
    <div class="field">
      <label for="colorCode">Color</label>
      <input pInputText
             id="colorCode"
             class="input-color"
             [ngClass]="{'ng-invalid ng-dirty': colorCode.touched && colorCode.invalid}"
             formControlName="colorCode"
             aria-describedby="colorCode-help"
             type="color" />
      <small *ngIf="colorCode.touched && colorCode.hasError('required')"
             id="colorCode-help"
             class="p-error block">{{formErrors.required}}</small>
    </div>
  </div>
  <div class="col-12 pb-0 pt-4 pr-0 pl-0 text-right">
    <button pButton
            pRipple
            type="button"
            label="Cancelar"
            icon="pi pi-times"
            (click)="close()"
            class="p-button-text mr-4">
    </button>
    <button pButton
            pRipple
            [disabled]="form.invalid"
            type="submit"
            label="Guardar"
            icon="pi pi-check"
            class="p-button-raised">
    </button>
  </div>
</form>

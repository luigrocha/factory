<form (ngSubmit)="save()" [formGroup]="form" autocomplete="off">
  <div class="p-fluid p-formgrid grid">
    <div class="field col-12">
      <label for="code">Ptroq</label>
      <input pInputText
             id="code"
             [ngClass]="{'ng-invalid ng-dirty': code.touched && code.invalid}"
             formControlName="code"
             aria-describedby="code-help"
             appInputUppercase
             maxlength="8"
             type="text" />
      <small *ngIf="code.touched && code.hasError('required')"
             id="code-help"
             class="p-error block">{{formErrors.required}}</small>
    </div>

    <div class="field col-12">
      <label for="name">Nombre</label>
      <input pInputText
             id="name"
             [ngClass]="{'ng-invalid ng-dirty': name.touched && name.invalid}"
             formControlName="name"
             aria-describedby="name-help"
             maxlength="32"
             type="text"/>
      <small *ngIf="name.touched && name.hasError('required')"
             id="name-help"
             class="p-error block">{{formErrors.required}}</small>
    </div>

    <div class="field col-12" *ngIf="isUpdateMode">
      <label for="statusId">Estado</label>
      <p-dropdown [options]="dieProductStates$ | async"
                  id="statusId"
                  formControlName="statusId"
                  placeholder="Seleccione un estado"
                  optionLabel="name"
                  optionValue="id"
                  [showClear]="true"></p-dropdown>
      <small *ngIf="statusId.touched && statusId.hasError('required')"
             id="statusId-help"
             class="p-error block">{{formErrors.required}}</small>
    </div>


    <div class="field col-12 md:col-6">
      <label for="area">Área</label>
      <input pInputText
             id="area"
             [ngClass]="{'ng-invalid ng-dirty': area.touched && area.invalid}"
             formControlName="area"
             aria-describedby="area-help"
             type="number" />
      <small *ngIf="area.touched && area.hasError('required')"
             id="area-help"
             class="p-error block">{{formErrors.required}}</small>
    </div>
    <div class="field col-12 md:col-6">
      <label for="length">Largo (mm)</label>
      <input pInputText
             id="length"
             [ngClass]="{'ng-invalid ng-dirty': length.touched && length.invalid}"
             formControlName="length"
             aria-describedby="length-help"
             type="number"/>
      <small *ngIf="length.touched && length.hasError('required')"
             id="length-help"
             class="p-error block">{{formErrors.required}}</small>
    </div>
    <div class="field col-12 md:col-6">
      <label for="width">Ancho (mm)</label>
      <input pInputText
             id="width"
             [ngClass]="{'ng-invalid ng-dirty': width.touched && width.invalid}"
             formControlName="width"
             aria-describedby="width-help"
             type="number"/>
      <small *ngIf="width.touched && width.hasError('required')"
             id="width-help"
             class="p-error block">{{formErrors.required}}</small>
    </div>
    <div class="field col-12 md:col-6">
      <label for="gsmdis">Gsmdis</label>
      <input pInputText
             id="gsmdis"
             [ngClass]="{'ng-invalid ng-dirty': gsmdis.touched && gsmdis.invalid}"
             formControlName="gsmdis"
             aria-describedby="gsmdis-help"
             type="number"/>
      <small *ngIf="gsmdis.touched && gsmdis.hasError('required')"
             id="gsmdis-help"
             class="p-error block">{{formErrors.required}}</small>
    </div>
  </div>
  <div class="col-12 pb-0 pt-4 pr-0 pl-0 text-right">
    <button pButton
            pRipple
            type="button"
            label="Cancelar"
            icon="pi pi-times"
            (click)="close()"
            class="p-button-text mr-4">
    </button>
    <button pButton
            pRipple
            [disabled]="form.invalid"
            type="submit"
            label="Guardar"
            icon="pi pi-check"
            class="p-button-raised">
    </button>
  </div>
</form>

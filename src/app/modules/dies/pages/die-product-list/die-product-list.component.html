<div class="p-grid">
  <div class="p-col-12">
    <p-toast></p-toast>

    <div class="card">
      <p-table #dt
               [value]="dieProducts"
               [columns]="columns"
               [rows]="pageSize"
               [paginator]="true"
               [globalFilterFields]="['code', 'name', 'status.name', 'gsmdis']"
               [rowHover]="true"
               dataKey="id"
               [showCurrentPageReport]="true"
               [currentPageReportTemplate]="tableReportTemplate"
               [rowsPerPageOptions]="rowsPerPageOptions"
               styleClass="p-datatable-sm"
               responsiveLayout="scroll">
        <ng-template pTemplate="caption">
          <div class="flex justify-content-between flex-column sm:flex-row">
            <h5 class="h-100 mb-0 align-self-center">Gestión de Productos Troquelados</h5>
            <span class="flex-auto"></span>
            <button pButton
                    pRipple
                    label="Limpiar"
                    icon="pi pi-filter-slash"
                    class="p-button-outlined sm:mr-2 md:mr-2 lg:mr-2"
                    (click)="clear(dt)"></button>
            <button
              pButton
              pRipple
              label="Nuevo"
              class="sm:mr-2 md:mr-2 lg:mr-2"
              icon="pi pi-plus"
              (click)="addDieProduct()"
            ></button>
            <span class="p-input-icon-left">
              <i class="pi pi-search"></i>
              <input pInputText
                     type="text"
                     (input)="dt.filterGlobal($event.target.value, 'contains')"
                     placeholder="Buscar..."
                     class="w-full"/>
            </span>
          </div>
        </ng-template>
        <ng-template pTemplate="header">
          <tr>
            <th *ngFor="let col of columns" [pSortableColumn]="col.field">
              {{col.header}}
              <p-sortIcon [field]="col.field"></p-sortIcon>
              <p-columnFilter [type]="col.type" [maxFractionDigits]="4" [field]="col.field" display="menu"></p-columnFilter>
            </th>
            <th>
              Estado
              <p-columnFilter field="status.name" matchMode="equals" display="menu">
                <ng-template pTemplate="filter" let-value let-filter="filterCallback">
                  <p-dropdown [ngModel]="value"
                              [options]="dieProductStates"
                              (onChange)="filter($event.value.name)"
                              placeholder="{{ value ?  value : 'Estado'}}">
                    <ng-template let-option pTemplate="item">
                        <span class="die-badge"
                              [style.color]="option.color"
                              [style.backgroundColor]="option.backgroundColor">{{option.name}}</span>
                    </ng-template>
                  </p-dropdown>
                </ng-template>
              </p-columnFilter>
            </th>
            <th class="text-center">
              <i class="pi pi-cog" style="font-size: 18px" pTooltip="Opciones"></i>
            </th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-die>
          <tr>
            <td *ngFor="let col of columns">
              {{die[col.field]}}
            </td>
            <td style="min-width: 10rem">
              <span class="die-badge" appStatusHighlight [status]="die.status">
                {{die.status.name}}
              </span>
            </td>
            <td>
              <div class="flex justify-content-center">
                <button type="button"
                        pButton
                        icon="pi pi-ellipsis-v"
                        class="p-button-secondary p-button-outlined"
                        (click)="selectedDieProduct = die; menu1.toggle($event)">
                </button>
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="summary">
          <div class="p-d-flex p-ai-center p-jc-between">
            Total de Productos Troquelados:
            {{ dieProducts ? dieProducts.length : 0 }}
          </div>
        </ng-template>
      </p-table>
    </div>
    <p-confirmDialog [style]="{ width: '450px' }"
                     rejectButtonStyleClass="p-button-text"
                     acceptButtonStyleClass="p-button-raised"></p-confirmDialog>
  </div>
</div>
<p-menu #menu1 [popup]="true" [model]="menuItems"></p-menu>

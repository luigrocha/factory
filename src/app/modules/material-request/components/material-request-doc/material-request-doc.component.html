<form (ngSubmit)="save()" [formGroup]="form" autocomplete="off">
  <div class="col-12">
    <div class="grid">
      <h5 class="md:col-6 col-12 flex align-items-center">
        Solicitud: {{idRequest}}
      </h5>
      <div class="field md:col-6 col-12 flex flex-column">
        <label for="turn">Turno</label>
        <p-dropdown
          [ngClass]="{'ng-invalid ng-dirty':turn.touched && turn.invalid}"
          [options]="turns"
          [style]="{ width: '100%' }"
          emptyMessage="No se encontraron resultados"
          formControlName="turn"
          id="turn"
          optionLabel="name"
          optionValue="id"
          placeholder="Seleccione un turno"
        ></p-dropdown>
        <small
          *ngIf="turn.touched && turn.hasError('required')"
          class="p-error block"
        >{{ formErrors.required }}</small>
      </div>
    </div>

    <p-table #dt
             [columns]="columns"
             [currentPageReportTemplate]="tableReportTemplate"
             [paginator]="true"
             [rowHover]="true"
             [rowsPerPageOptions]="rowsPerPageOptions"
             [rows]="pageSize"
             [showCurrentPageReport]="true"
             [value]="materialRequest"
             styleClass="p-datatable-sm">
      <ng-template pTemplate="caption">
        <div class="flex justify-content-between flex-column sm:flex-row">
          <h5 class="h-100 align-self-center mb-2 md:mb-0">Solicitud de Materia Prima</h5>
          <span class="flex-auto"></span>
          <button (click)="addRow()"
                  class="sm:mr-2 md:mr-2 lg:mr-2"
                  icon="pi pi-plus"
                  label="Añadir"
                  pButton
                  pRipple
          ></button>
          <button (click)="dt.exportCSV()"
                  class="p-button-help mb-2 md:mr-2 md:mb-0"
                  icon="pi pi-upload"
                  label="Export"
                  pButton
                  pRipple
          ></button>
          <span class="p-input-icon-left">
              <i class="pi pi-search"></i>
              <input (input)="dt.filterGlobal($event.target.value, 'contains')" class="w-full"
                     pInputText
                     placeholder="Buscar..."
                     type="text"/>
            </span>
        </div>
      </ng-template>
      <ng-template pTemplate="header">
        <tr>
          <th *ngFor="let col of columns" [pSortableColumn]="col.field">
            {{col.header}}
          </th>
        </tr>
      </ng-template>
      <ng-template let-row pTemplate="body">
        <tr>
          <td *ngFor="let col of columns">
            {{row[col.field]}}
          </td>
        </tr>
      </ng-template>
    </p-table>

    <div class="col-12 flex flex-column md:flex-row justify-content-center">
      <button
        [disabled]="form.invalid"
        (click)="onCreate(false)"
        class="mb-3 md:mb-0 mr-0 md:mr-3"
        icon="pi pi-database"
        label="Guardar Borrador"
        pButton
        pRipple
        type="submit">
      </button>
      <button
        [disabled]="form.invalid"
        (click)="onCreate(true)"
        icon="pi pi-save"
        label="Guardar Terminado"
        pButton
        pRipple
        type="submit">
      </button>
    </div>
  </div>
</form>

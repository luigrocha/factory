<div class="p-grid">
  <div class="p-col-12">
    <p-toast></p-toast>

    <div class="card">
      <p-table #dt
               [columns]="columns"
               [currentPageReportTemplate]="tableReportTemplate"
               [paginator]="true"
               [rowHover]="true"
               [rowsPerPageOptions]="rowsPerPageOptions"
               [rows]="searchRequest.size"
               [showCurrentPageReport]="true"
               [value]="requests"
               dataKey="id"
               lazy="true"
               responsiveLayout="scroll"
               styleClass="p-datatable-sm">
        <ng-template pTemplate="caption">
          <div class="flex justify-content-between flex-column sm:flex-row">
            <h5 class="h-100 align-self-center mb-2 md:mb-0">Gestión de Solicitud de Materia Prima</h5>
            <span class="flex-auto"></span>
            <button (click)="createMaterialRequest()"
                    *ngIf="isAllow(1)"
                    class="mb-2 md:mr-2 md:mb-0"
                    icon="pi pi-plus"
                    label="Nuevo"
                    pButton
                    pRipple
            ></button>
            <button (click)="dt.exportCSV()"
                    *ngIf="isAllow(5)"
                    class="p-button-help mb-2 md:mr-2 md:mb-0"
                    icon="pi pi-upload"
                    label="Export"
                    pButton
                    pRipple
            ></button>
            <span class="p-input-icon-left">
              <i class="pi pi-search"></i>
              <input (input)="dt.filterGlobal($event.target.value, 'contains')"
                     class="w-full"
                     pInputText
                     placeholder="Buscar..."
                     type="text"/>
            </span>
          </div>
        </ng-template>
      </p-table>
    </div>
  </div>
</div>

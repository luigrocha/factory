<p-toast></p-toast>
<div
  id="layout-config"
  class="layout-config"
  [ngClass]="{ 'layout-config-active': appMain.configActive }"
  (click)="appMain.onConfigClick($event)"
>
  <a
    style="cursor: pointer"
    id="layout-config-button"
    class="layout-config-button"
    (click)="onConfigButtonClick($event)"
  >
    <i class="pi pi-cog"></i>
  </a>
  <div class="layout-config-content">
    <div class="layout-config-form" id="config-form">
      <div class="layout-config-header">
        <h5>Personalizar tema</h5>
        <span>En esta sección puede personalizar los colores y estilos según su preferencia.</span>
      </div>

      <div id="lightdark-panel" class="layout-config-section options">
        <h6>Modo Color</h6>
        <div class="flex justify-content-between">
          <div class="flex align-items-center">
            <p-radioButton
              name="layoutMode"
              value="light"
              [(ngModel)]="config.layoutMode"
              inputId="layoutMode1"
              (onClick)="onLayoutModeChange($event)"
            ></p-radioButton>
            <label for="layoutMode1" class="ml-2">Light</label>
          </div>
          <div class="flex align-items-center">
            <p-radioButton
              name="layoutMode"
              value="dark"
              [(ngModel)]="config.layoutMode"
              inputId="layoutMode2"
              (onClick)="onLayoutModeChange($event)"
            ></p-radioButton>
            <label for="layoutMode2" class="ml-2">Dark</label>
          </div>
          <div class="flex align-items-center">
            <p-radioButton
              name="layoutMode"
              value="dim"
              [(ngModel)]="config.layoutMode"
              inputId="layoutMode3"
              (onClick)="onLayoutModeChange($event)"
            ></p-radioButton>
            <label for="layoutMode3" class="ml-2">Dim</label>
          </div>
        </div>
      </div>

      <div id="menumodes-panel" class="layout-config-section options">
        <h6 class="mt-2">Modo Menú</h6>
        <div class="flex justify-content-between">
          <div class="flex align-items-center">
            <p-radioButton
              name="menuMode"
              value="static"
              [(ngModel)]="config.menuMode"
              inputId="menuMode1"
            ></p-radioButton>
            <label for="menuMode1" class="ml-2">Static</label>
          </div>
          <div class="flex align-items-center">
            <p-radioButton
              name="menuMode"
              value="horizontal"
              [(ngModel)]="config.menuMode"
              inputId="menuMode3"
            ></p-radioButton>
            <label for="menuMode3" class="ml-2">Horizontal</label>
          </div>
        </div>
      </div>

      <div id="menuthemes-panel" class="layout-config-section options">
        <h6 class="mt-2">Tema Menú</h6>
        <div class="flex justify-content-between">
          <div class="flex align-items-center">
            <p-radioButton
              name="menuTheme"
              [disabled]="config.layoutMode !== 'light'"
              value="light"
              [(ngModel)]="config.menuTheme"
              inputId="menuTheme1"
            ></p-radioButton>
            <label for="menuTheme1" class="ml-2">Light</label>
          </div>
          <div class="flex align-items-center">
            <p-radioButton
              name="menuTheme"
              [disabled]="config.layoutMode !== 'light'"
              value="dark"
              [(ngModel)]="config.menuTheme"
              inputId="menuTheme2"
            ></p-radioButton>
            <label for="menuTheme2" class="ml-2">Dark</label>
          </div>
          <div class="flex align-items-center">
            <p-radioButton
              name="menuTheme"
              [disabled]="config.layoutMode !== 'light'"
              value="dim"
              [(ngModel)]="config.menuTheme"
              inputId="menuTheme3"
            ></p-radioButton>
            <label for="menuTheme3" class="ml-2">Dim</label>
          </div>
        </div>
      </div>

      <div id="topbarthemes-panel" class="layout-config-section options">
        <h6 class="mt-2">Modo Barra Superior</h6>
        <div class="flex justify-content-between">
          <div class="flex align-items-center">
            <p-radioButton
              name="topbarTheme"
              [disabled]="config.layoutMode !== 'light'"
              value="light"
              [(ngModel)]="config.topbarTheme"
              inputId="topbarTheme1"
            ></p-radioButton>
            <label for="topbarTheme1" class="ml-2">Light</label>
          </div>
          <div class="flex align-items-center">
            <p-radioButton
              name="topbarTheme"
              [disabled]="config.layoutMode !== 'light'"
              value="dark"
              [(ngModel)]="config.topbarTheme"
              inputId="topbarTheme2"
            ></p-radioButton>
            <label for="topbarTheme2" class="ml-2">Dark</label>
          </div>
          <div class="flex align-items-center">
            <p-radioButton
              name="topbarTheme"
              [disabled]="config.layoutMode !== 'light'"
              value="dim"
              [(ngModel)]="config.topbarTheme"
              inputId="topbarTheme3"
            ></p-radioButton>
            <label for="topbarTheme3" class="ml-2">Dim</label>
          </div>
        </div>
      </div>

      <div id="componentthemes-panel" class="layout-config-section colors">
        <h6 class="mt-2">Colores</h6>
        <div class="grid layout-config-colors">
          <div *ngFor="let t of themes" class="col col-fixed">
            <a
              style="cursor: pointer"
              (click)="changeTheme(t.name)"
              class="layout-config-option"
            >
              <span
                class="layout-config-option-color"
                [ngStyle]="{ 'background-color': t.color }"
              ></span>
              <span
                class="layout-config-option-check-mask"
                *ngIf="theme === t.name"
              >
                <i class="pi pi-check"></i>
              </span>
            </a>
          </div>
        </div>
      </div>
      <div class="flex justify-content-center">
        <button
          pButton
          pRipple
          label="Guardar"
          icon="pi pi-save"
          class="p-mt-2 justify-self-center"
          (click)="onUpdatePreferences()"
        ></button>
      </div>
    </div>
  </div>
</div>

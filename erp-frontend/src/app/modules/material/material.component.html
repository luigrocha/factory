<div class="card">
  <p-tabView orientation="left" *ngIf="typeMaterials" [scrollable]="true" (onChange)="onChangeTab($event)">
    <p-tabPanel *ngFor="let type of typeMaterials; let i = index" [selected]="i == 0" header="{{type.name}}"
      [showCurrentPageReport]="true" [rowsPerPageOptions]="[10,25,50]" class="line-height-3 m-0">
      <p-table #dt [value]="materials" [columns]="cols" [rows]="6" [paginator]="true" [globalFilterFields]="['name']"
        [rowHover]="true" dataKey="id" styleClass="p-datatable-customers p-datatable-sm">
        <ng-template pTemplate="caption">
          <div class="flex justify-content-between flex-column sm:flex-row">
            <h5 class="h-100 align-self-center mb-2 md:mb-0">Gestión de Materia Prima</h5>
            <span class="flex-auto"></span>
            <button pButton pRipple label="Nuevo" icon="pi pi-plus" class="mb-2 md:mr-2 md:mb-0" (click)="openNew()"
              *ngIf="isAllow(1)"></button>
            <button pButton pRipple label="Eliminar" icon="pi pi-trash" class="p-button-danger mb-2 md:mr-2 md:mb-0"
              (click)="deleteSelectedColors()" [disabled]="!selectedColor || !selectedColor.length"
              *ngIf="isAllow(4)"></button>
            <button pButton pRipple label="Export" icon="pi pi-upload" class="p-button-help mb-2 md:mr-2 md:mb-0"
              (click)="dt.exportCSV()" *ngIf="isAllow(5)"></button>

            <span class="p-input-icon-left">
              <i class="pi pi-search"></i>
              <input pInputText type="text" (input)="dt.filterGlobal($event.target.value, 'contains')"
                placeholder="Buscar..." class="w-full" />
            </span>
          </div>
        </ng-template>

        <ng-template pTemplate="header">
          <tr>
            <th style="width: 3rem">
              <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
            </th>
            <th pSortableColumn="name">
              Nombre <p-sortIcon field="name"></p-sortIcon>
            </th>
            <th class="text-center">
              <i class="pi pi-cog" style="font-size: 18px" pTooltip="Opciones"></i>
            </th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-color>
          <tr>
            <td>
              <p-tableCheckbox [value]="color"></p-tableCheckbox>
            </td>
            <td>
              <span class="p-column-title">Nombre</span>
              {{ color.name }}
            </td>
            <td>
              <div class="flex justify-content-evenly">
                <button type="button" pButton icon="pi pi-ellipsis-v" class="p-button-secondary p-button-outlined"
                  (click)="menu1.toggle($event)">
                </button>
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="summary">
          <div class="p-d-flex p-ai-center p-jc-between">
            Total de {{type.name}}:
            {{ materials ? materials.length : 0 }}
          </div>
        </ng-template>
      </p-table>
    </p-tabPanel>
  </p-tabView>
</div>
<p-menu #menu1 [popup]="true" [model]="items"></p-menu>

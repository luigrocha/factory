<div class="p-grid">
  <div class="p-col-12">
    <p-toast></p-toast>

    <div class="card">
      <p-table #dt
               [value]="locations"
               [columns]="columns"
               [rows]="pageSize"
               [paginator]="true"
               [globalFilterFields]="['location', 'description']"
               [(selection)]="selectedLocations"
               [rowHover]="true"
               [showCurrentPageReport]="true"
               [currentPageReportTemplate]="tableReportTemplate"
               [rowsPerPageOptions]="rowsPerPageOptions"
               dataKey="id"
               styleClass="p-datatable-sm"
               responsiveLayout="scroll">
        <ng-template pTemplate="caption">
          <div class="flex justify-content-between flex-column sm:flex-row">
            <h5 class="h-100 align-self-center mb-2 md:mb-0">Gestión de Ubicaciones</h5>
            <span class="flex-auto"></span>
            <button pButton
                    pRipple
                    label="Nuevo"
                    icon="pi pi-plus"
                    class="mb-2 md:mr-2 md:mb-0"
                    (click)="createLocation()" *ngIf="isAllow(1)"
            ></button>
            <button pButton
                    pRipple
                    label="Eliminar"
                    icon="pi pi-trash"
                    class="p-button-danger mb-2 md:mr-2 md:mb-0"
                    (click)="deleteSelectedLocations()"
                    [disabled]="!selectedLocations || !selectedLocations.length"
                    *ngIf="isAllow(4)"
            ></button>
            <button pButton
                    pRipple
                    label="Export"
                    icon="pi pi-upload"
                    class="p-button-help mb-2 md:mr-2 md:mb-0"
                    (click)="dt.exportCSV()"
                    *ngIf="isAllow(5)"
            ></button>
            <span class="p-input-icon-left">
              <i class="pi pi-search"></i>
              <input pInputText
                     type="text"
                     (input)="dt.filterGlobal($event.target.value, 'contains')"
                     placeholder="Buscar..."
                     class="w-full" />
            </span>
          </div>
        </ng-template>
        <ng-template pTemplate="header">
          <tr>
            <th style="width: 3rem">
              <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
            </th>
            <th pSortableColumn="location">
              Código <p-sortIcon field="location"></p-sortIcon>
            </th>
            <th pSortableColumn="description">
              Ubicación <p-sortIcon field="description"></p-sortIcon>
            </th>
            <th class="text-center">
              <i class="pi pi-cog" style="font-size: 18px" pTooltip="Opciones"></i>
            </th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-location>
          <tr>
            <td>
              <p-tableCheckbox [value]="location"></p-tableCheckbox>
            </td>
            <td>
              <span class="p-column-title">Código</span>
              {{ location.location }}
            </td>
            <td>
              <span class="p-column-title">Ubicación</span>
              {{ location.description }}
            </td>
            <td>
              <div class="flex justify-content-center">
                <button type="button"
                        pButton
                        icon="pi pi-ellipsis-v"
                        class="p-button-secondary p-button-outlined"
                        (click)="selectedLocation = location; menu.toggle($event)">
                </button>
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="summary">
          <div class="p-d-flex p-ai-center p-jc-between">
            Total de Ubicaciones:
            {{ locations ? locations.length : 0 }}
          </div>
        </ng-template>
      </p-table>
    </div>

    <p-confirmDialog [style]="{ width: '450px' }"
                     rejectButtonStyleClass="p-button-text"
                     acceptButtonStyleClass="p-button-raised"></p-confirmDialog>
  </div>
</div>
<p-menu #menu [popup]="true" [model]="menuItems" appendTo="body"></p-menu>

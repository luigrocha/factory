# docker-compose.yml for local development
version: "3"
services:
  db:
    container_name: "cartonplast-mariadb"
    image: mariadb/server:10.5
    restart: on-failure
    environment:
      MARIADB_ROOT_PASSWORD: "root"
      MARIADB_DATABASE: "cartonplast-dev"
      MARIADB_USER: "cartonplast-dev"
      MARIADB_PASSWORD: "cartonplast-dev"
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - db_conf:/etc/mysql
volumes:
  db_data:
  db_conf: